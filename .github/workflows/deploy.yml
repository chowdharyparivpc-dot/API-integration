name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest -v 2>/dev/null || echo "No tests found, skipping"

      - name: Verify app.py syntax
        run: python -m py_compile app.py

      - name: Notify Render (Optional - Manual)
        run: |
          echo "Deployment ready!"
          echo "To deploy on Render.com:"
          echo "1. Connect your GitHub repo to Render.com dashboard"
          echo "2. Create new Web Service and select this repository"
          echo "3. Set runtime to Python 3.11.9"
          echo "4. Build command: pip install -r requirements.txt"
          echo "5. Start command: gunicorn app:app"
