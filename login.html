<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Eats Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; padding: 20px;
      font-family: Arial, sans-serif; background: #f4f7fb;
      display: grid; place-items: center;
    }
    .box {
      width: 100%; max-width: 380px; padding: 28px;
      background: #fff; border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1, p { text-align: center; }
    h1 { margin: 0 0 6px; color: #2563eb; }
    p { margin: 0 0 24px; color: #6b7280; }
    .tabs { display: flex; margin-bottom: 18px; border-bottom: 1px solid #ddd; }
    .tab {
      flex: 1; padding: 10px; border: 0; background: #fff;
      cursor: pointer; font-weight: bold; color: #6b7280;
    }
    .tab.active { color: #2563eb; border-bottom: 2px solid #2563eb; }
    form { display: none; }
    form.active { display: block; }
    input {
      width: 100%; margin: 8px 0; padding: 11px;
      border: 1px solid #ddd; border-radius: 7px; font-size: 14px;
    }
    .submit {
      width: 100%; margin-top: 10px; padding: 12px;
      border: 0; border-radius: 7px; background: #2563eb;
      color: #fff; font-weight: bold; cursor: pointer;
    }
    .msg { margin-top: 12px; font-size: 14px; text-align: center; }
    .error { color: #dc2626; }
    .success { color: #16a34a; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Elite Eats</h1>
    <p>Login to order your favorite food</p>

    <div class="tabs">
      <button class="tab active" onclick="showForm(event,'login')">Login</button>
      <button class="tab" onclick="showForm(event,'register')">Sign Up</button>
    </div>

    <form id="login" class="active">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button class="submit">Login</button>
      <div id="loginMsg" class="msg"></div>
    </form>

    <form id="register">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPassword" placeholder="Password" required>
      <button class="submit">Create Account</button>
      <div id="regMsg" class="msg"></div>
    </form>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    function showForm(e, id) {
      document.querySelectorAll('form,.tab').forEach(x => x.classList.remove('active'));
      $(id).classList.add('active');
      e.target.classList.add('active');
    }

    async function send(url, data, msgId) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const out = await res.json();
      $(msgId).textContent = out.message || (res.ok ? 'Success' : 'Something went wrong');
      $(msgId).className = 'msg ' + (res.ok ? 'success' : 'error');
      if (res.ok) setTimeout(() => location.href = '/', 800);
    }

    $('login').onsubmit = e => {
      e.preventDefault();
      send('/login', { email: loginEmail.value, password: loginPassword.value }, 'loginMsg');
    };

    $('register').onsubmit = e => {
      e.preventDefault();
      send('/register', {
        username: username.value,
        email: regEmail.value,
        password: regPassword.value
      }, 'regMsg');
    };
  </script>
</body>
</html>
