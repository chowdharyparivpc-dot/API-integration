<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - Elite Eats</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #fff;
            --muted: #6b7280;
            --accent: #2563eb;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Inter, Segoe UI, Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            color: #111;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .back-btn {
            padding: 8px 16px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            color: #111;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #e5e7eb;
        }

        .layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 32px;
        }

        .profile-card {
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(16, 24, 40, 0.06);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 16px;
            color: #fff;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        .profile-email {
            font-size: 13px;
            color: var(--muted);
            margin: 4px 0 0 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #111;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-primary:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-logout {
            width: 100%;
            padding: 10px;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
        }

        .btn-logout:hover {
            background: #fecaca;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .orders-section {
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(16, 24, 40, 0.06);
        }

        .orders-section h2 {
            margin: 0 0 20px 0;
            font-size: 20px;
        }

        .order-item {
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-id {
            font-weight: 600;
            font-size: 14px;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .order-status.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .order-status.confirmed {
            background: #dbeafe;
            color: #0c4a6e;
        }

        .order-status.delivered {
            background: #dcfce7;
            color: #166534;
        }

        .order-info {
            font-size: 13px;
            color: var(--muted);
            display: flex;
            gap: 16px;
        }

        .order-items {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }

        .order-items span {
            display: inline-block;
            font-size: 13px;
            color: #111;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Profile</h1>
            <a href="/" class="back-btn">← Back to Store</a>
        </div>

        <div class="layout">
            <!-- Profile Card -->
            <div class="profile-card">
                <div id="message" class="message"></div>
                
                <div class="profile-header">
                    <div class="avatar" id="avatar">👤</div>
                    <h2 class="profile-name" id="fullName">User Name</h2>
                    <p class="profile-email" id="email">email@example.com</p>
                </div>

                <form id="profileForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="first_name" />
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="last_name" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" />
                    </div>

                    <div class="form-group">
                        <label for="address">Delivery Address</label>
                        <input type="text" id="address" name="address" />
                    </div>

                    <button type="submit" class="btn-primary">Save Changes</button>
                </form>

                <button class="btn-logout" onclick="location.href='/logout'">🚪 Logout</button>
            </div>

            <!-- Orders Section -->
            <div class="orders-section">
                <h2>📋 Order History</h2>
                <div id="ordersList">
                    <div class="empty-state">
                        <div class="empty-state-icon">🛒</div>
                        <p>No orders yet. Start shopping!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const messageEl = document.getElementById('message');

        // Load user profile
        async function loadProfile() {
            try {
                const response = await fetch('/api/user');
                if (!response.ok) throw new Error('Failed to load profile');
                
                const user = await response.json();
                
                // Update profile display
                document.getElementById('fullName').textContent = 
                    `${user.first_name || ''} ${user.last_name || 'User'}`.trim();
                document.getElementById('email').textContent = user.email;
                
                // Update avatar initial
                const initial = (user.first_name || user.email)[0].toUpperCase();
                document.getElementById('avatar').textContent = initial;
                
                // Fill form fields
                document.getElementById('firstName').value = user.first_name || '';
                document.getElementById('lastName').value = user.last_name || '';
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('address').value = user.address || '';
            } catch (err) {
                showMessage('Failed to load profile', 'error');
                console.error(err);
            }
        }

        // Load orders
        async function loadOrders() {
            try {
                const response = await fetch('/api/orders');
                if (!response.ok) throw new Error('Failed to load orders');
                
                const orders = await response.json();
                const ordersList = document.getElementById('ordersList');
                
                if (orders.length === 0) {
                    ordersList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🛒</div>
                            <p>No orders yet. Start shopping!</p>
                        </div>
                    `;
                    return;
                }

                ordersList.innerHTML = orders.map(order => {
                    const date = new Date(order.created_at).toLocaleDateString();
                    const itemCount = order.items ? order.items.length : 0;
                    
                    return `
                        <div class="order-item">
                            <div class="order-header">
                                <div class="order-id">Order #${order.id}</div>
                                <div class="order-status ${order.status}">${order.status}</div>
                            </div>
                            <div class="order-info">
                                <span>📅 ${date}</span>
                                <span>📦 ${order.total_items} items</span>
                            </div>
                            <div class="order-items">
                                ${order.items && order.items.length > 0 ? 
                                    `<span>Items: ${order.items.map(i => `${i.qty}x`).join(' + ')}</span>` : 
                                    '<span>No items</span>'}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to load orders:', err);
            }
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 4000);
        }

        // Handle profile update
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            try {
                const response = await fetch('/api/user', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) throw new Error('Failed to update profile');
                
                showMessage('Profile updated successfully!', 'success');
                
                // Reload to show updated info
                await new Promise(r => setTimeout(r, 1500));
                loadProfile();
            } catch (err) {
                showMessage('Failed to save profile', 'error');
                console.error(err);
            }
        });

        // Initial load
        loadProfile();
        loadOrders();
    </script>
</body>
</html>
